<h3 mat-dialog-title>{{ 'Tags management' | translate }}</h3>

<div mat-dialog-content style="min-width: 420px; overflow-x: hidden">

  <mtx-grid
    [data]="availableTags"
    [columns]="tableHeaders"
    [cellTemplate]="{ actions: actionsTpl }"
    [rowStriped]="false"
    [showPaginator]="false"
    [showToolbar]="false"
  >
  </mtx-grid>

  <!-- ADD MORE TAGS -->
  <div class="d-flex flex-row justify-content-start align-items-center gap-12 py-2">
    <button
      *ngIf="showMultipleCreateBtn"
      mat-button
      color="primary"
      id="newTagsBtn"
      (click)="showMultipleCreateTagModal()"
      type="button">
      <mat-icon>add</mat-icon>
      <span>{{ 'Add bulk' | translate }}</span>
    </button>
    <button
      mat-button
      color="primary"
      id="newTagBtn"
      (click)="showCreateTagModal()"
      type="button">
      <mat-icon>add</mat-icon>
      <span>{{ 'Add new' | translate }}</span>
    </button>
  </div>
</div>

<ng-template #actionsTpl let-row>
  <div>
    <button
      *ngIf="!row.isLocked"
      mat-icon-button
      color="accent"
      class="small-icon-btn"
      (click)="showEditTagModal(row)"
      matTooltip="{{ 'Edit' | translate }}"
    >
      <mat-icon>edit</mat-icon>
    </button>

    <button
      *ngIf="!row.isLocked"
      mat-icon-button
      color="warn"
      class="small-icon-btn"
      (click)="showDeleteTagModal(row)"
      matTooltip="{{ 'Delete' | translate }}"
    >
      <mat-icon>delete</mat-icon>
    </button>

  </div>
</ng-template>

<div mat-dialog-actions class="d-flex justify-content-end pt-0 mt-0">
  <button
    class="btn-cancel"
    (click)="hide()"
    id="tagsModalCloseBtn">
    {{ 'Close' | translate }}
  </button>
</div>
